<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InterviewAI — Practice & Ace Your Interviews</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      #auth-backdrop {
        position: fixed; inset: 0;
        background: rgba(3,3,18,0.88);
        backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        display: flex; align-items: center; justify-content: center;
        z-index: 9999; opacity: 0; pointer-events: none;
        transition: opacity 0.25s ease;
      }
      #auth-backdrop.open { opacity: 1; pointer-events: all; }

      #auth-modal {
        background: #09091f;
        border: 1px solid rgba(0,212,255,0.18);
        border-radius: 20px; width: 100%; max-width: 420px; padding: 36px 32px;
        position: relative;
        transform: translateY(20px) scale(0.96);
        transition: transform 0.3s cubic-bezier(0.34,1.4,0.64,1), opacity 0.25s ease;
        opacity: 0; font-family: 'Sora', sans-serif;
      }
      #auth-backdrop.open #auth-modal { transform: translateY(0) scale(1); opacity: 1; }

      .auth-close { position: absolute; top: 16px; right: 18px; background: transparent; border: none; color: rgba(255,255,255,0.25); font-size: 20px; cursor: pointer; line-height: 1; transition: color 0.15s; }
      .auth-close:hover { color: rgba(255,255,255,0.6); }

      .auth-logo { font-family: 'Space Mono', monospace; font-size: 13px; color: #00D4FF; letter-spacing: 2px; margin-bottom: 20px; }
      .auth-logo span { color: #fff; }

      .auth-tabs { display: flex; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 3px; margin-bottom: 26px; background: rgba(255,255,255,0.03); }
      .auth-tab { flex: 1; padding: 8px; font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 1px; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; background: transparent; color: rgba(255,255,255,0.35); }
      .auth-tab.active { background: rgba(0,212,255,0.12); color: #00D4FF; border: 1px solid rgba(0,212,255,0.25); }

      .auth-title { font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 4px; }
      .auth-sub   { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 24px; }

      .auth-field { margin-bottom: 15px; position: relative; }
      .auth-field label { display: block; font-size: 11px; font-family: 'Space Mono', monospace; letter-spacing: 1.2px; color: rgba(255,255,255,0.35); margin-bottom: 7px; }
      .auth-field .field-icon { position: absolute; left: 13px; top: 38px; width: 15px; height: 15px; opacity: 0.4; pointer-events: none; }
      .auth-field input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 9px; padding: 11px 14px 11px 38px; color: #e0e0f0; font-size: 14px; font-family: 'Sora', sans-serif; transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
      .auth-field input:focus { border-color: rgba(0,212,255,0.5); box-shadow: 0 0 0 3px rgba(0,212,255,0.07); }
      .auth-field input::placeholder { color: rgba(255,255,255,0.2); font-size: 13px; }

      .pw-wrap { position: relative; }
      .pw-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.25); font-size: 14px; padding: 2px; transition: color 0.15s; }
      .pw-toggle:hover { color: rgba(255,255,255,0.6); }

      .auth-err { font-size: 12px; color: #ff6b6b; margin-top: 5px; display: none; }
      .auth-err.show { display: block; }

      .strength-bar { height: 3px; border-radius: 2px; background: rgba(255,255,255,0.07); margin-top: 8px; overflow: hidden; }
      .strength-fill { height: 100%; border-radius: 2px; width: 0%; transition: width 0.3s, background 0.3s; }
      .strength-label { font-size: 10px; font-family: 'Space Mono', monospace; letter-spacing: 1px; margin-top: 5px; height: 13px; color: rgba(255,255,255,0.25); }

      .auth-submit { width: 100%; margin-top: 6px; padding: 13px; border-radius: 10px; font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 1.5px; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; position: relative; overflow: hidden; }
      .auth-submit.login-clr { background: linear-gradient(90deg,#00c9f0,#00D4FF); color: #050510; }
      .auth-submit.reg-clr   { background: linear-gradient(90deg,#7c3aed,#a855f7); color: #fff; }
      .auth-submit:hover  { filter: brightness(1.1); }
      .auth-submit:active { transform: scale(0.98); }
      .auth-submit.loading { pointer-events: none; opacity: 0.7; }
      .auth-submit .btn-txt { transition: opacity 0.15s; }
      .auth-submit .spinner { display: none; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: authSpin 0.6s linear infinite; position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); }
      .auth-submit.loading .btn-txt { opacity: 0; }
      .auth-submit.loading .spinner { display: block; }
      @keyframes authSpin { to { transform: translate(-50%,-50%) rotate(360deg); } }

      .auth-divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; }
      .auth-divider span { font-size: 11px; color: rgba(255,255,255,0.2); font-family: 'Space Mono', monospace; }
      .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.07); }

      .auth-social-btn { width: 100%; padding: 10px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.09); background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.5); font-size: 13px; font-family: 'Sora', sans-serif; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
      .auth-social-btn:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }

      .auth-switch { text-align: center; margin-top: 18px; font-size: 12px; color: rgba(255,255,255,0.3); }
      .auth-switch-link { color: #00D4FF; cursor: pointer; text-decoration: underline; background: none; border: none; font-size: 12px; font-family: 'Sora', sans-serif; }
      .auth-switch-link:hover { color: #66e5ff; }

      .auth-forgot { text-align: right; margin-bottom: 18px; margin-top: -6px; }
      .auth-forgot span { font-size: 11px; color: rgba(0,212,255,0.6); cursor: pointer; font-family: 'Space Mono', monospace; letter-spacing: 0.5px; }
      .auth-forgot span:hover { color: #00D4FF; }

      .auth-success { text-align: center; padding: 16px 0; }
      .auth-success-icon { width: 64px; height: 64px; border-radius: 50%; border: 2px solid #10B981; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 26px; animation: authPop 0.4s cubic-bezier(0.34,1.6,0.64,1); }
      @keyframes authPop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      .auth-success-title { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 6px; }
      .auth-success-sub   { font-size: 13px; color: rgba(255,255,255,0.4); }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <!-- AUTH MODAL — outside React root, triggered via window.openModal() -->
    <div id="auth-backdrop" onclick="window._authBackdropClick(event)">
      <div id="auth-modal">

        <button class="auth-close" onclick="window.closeModal()">✕</button>
        <div class="auth-logo"><span>INTER</span>VIEW_AI</div>

        <div class="auth-tabs">
          <button class="auth-tab active" id="auth-tab-login"    onclick="window.authSwitchTab('login')">LOG IN</button>
          <button class="auth-tab"        id="auth-tab-register" onclick="window.authSwitchTab('register')">REGISTER</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="auth-form-login">
          <div class="auth-title">Welcome back</div>
          <div class="auth-sub">Sign in to continue your practice</div>

          <div class="auth-field">
            <label>GMAIL ADDRESS</label>
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="#00D4FF" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
            </svg>
            <input type="email" id="login-email" placeholder="you@gmail.com" oninput="window._clearErr('login-email-err')" />
            <div class="auth-err" id="login-email-err"></div>
          </div>

          <div class="auth-field">
            <label>PASSWORD</label>
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="#00D4FF" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <div class="pw-wrap">
              <input type="password" id="login-pw" placeholder="Enter your password" oninput="window._clearErr('login-pw-err')" />
              <button class="pw-toggle" onclick="window._togglePw('login-pw',this)">👁</button>
            </div>
            <div class="auth-err" id="login-pw-err"></div>
          </div>

          <div class="auth-forgot"><span>FORGOT PASSWORD?</span></div>

          <button class="auth-submit login-clr" id="login-btn" onclick="window._handleLogin()">
            <span class="btn-txt">SIGN IN →</span>
            <div class="spinner"></div>
          </button>

          <div class="auth-divider"><span>OR</span></div>

          <button class="auth-social-btn" onclick="window._handleSocial('Google')">
            <svg width="16" height="16" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>

          <div class="auth-switch">
            Don't have an account?
            <button class="auth-switch-link" onclick="window.authSwitchTab('register')">Register here</button>
          </div>
        </div>
        <!-- END LOGIN FORM -->

        <!-- REGISTER FORM -->
        <div id="auth-form-register" style="display:none">
          <div class="auth-title">Create account</div>
          <div class="auth-sub">Start your interview journey today</div>

          <div class="auth-field">
            <label>FULL NAME</label>
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <input type="text" id="reg-name" placeholder="Your full name" oninput="window._clearErr('reg-name-err')" />
            <div class="auth-err" id="reg-name-err"></div>
          </div>

          <div class="auth-field">
            <label>GMAIL ADDRESS</label>
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
            </svg>
            <input type="email" id="reg-email" placeholder="you@gmail.com" oninput="window._clearErr('reg-email-err')" />
            <div class="auth-err" id="reg-email-err"></div>
          </div>

          <div class="auth-field">
            <label>PASSWORD</label>
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <div class="pw-wrap">
              <input type="password" id="reg-pw" placeholder="Min. 6 characters"
                oninput="window._checkStrength(this.value); window._clearErr('reg-pw-err')" />
              <button class="pw-toggle" onclick="window._togglePw('reg-pw',this)">👁</button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            <div class="strength-label" id="strength-label"></div>
            <div class="auth-err" id="reg-pw-err"></div>
          </div>

          <button class="auth-submit reg-clr" id="reg-btn" onclick="window._handleRegister()">
            <span class="btn-txt">CREATE ACCOUNT →</span>
            <div class="spinner"></div>
          </button>

          <div class="auth-switch" style="margin-top:16px">
            Already have an account?
            <button class="auth-switch-link" onclick="window.authSwitchTab('login')">Sign in</button>
          </div>
        </div>
        <!-- END REGISTER FORM -->

        <!-- SUCCESS STATE -->
        <div id="auth-form-success" style="display:none">
          <div class="auth-success">
            <div class="auth-success-icon">✓</div>
            <div class="auth-success-title" id="auth-success-title">Welcome!</div>
            <div class="auth-success-sub"   id="auth-success-sub">Redirecting...</div>
          </div>
        </div>
        <!-- END SUCCESS STATE -->

      </div><!-- /#auth-modal -->
    </div><!-- /#auth-backdrop -->

    <script>
      /* ══════════════════════════════════════════
         PUBLIC API — called from React App.jsx
      ══════════════════════════════════════════ */
      window.openModal = function(tab) {
        document.getElementById('auth-backdrop').classList.add('open');
        window.authSwitchTab(tab || 'login');
      };

      window.closeModal = function() {
        document.getElementById('auth-backdrop').classList.remove('open');
        _resetForms();
      };

      window.authSwitchTab = function(tab) {
        ['login','register','success'].forEach(function(t) {
          document.getElementById('auth-form-' + t).style.display = 'none';
        });
        document.getElementById('auth-form-' + tab).style.display = 'block';
        document.getElementById('auth-tab-login').classList.toggle('active',    tab === 'login');
        document.getElementById('auth-tab-register').classList.toggle('active', tab === 'register');
      };

      window._authBackdropClick = function(e) {
        if (e.target === document.getElementById('auth-backdrop')) window.closeModal();
      };

      /* ══════════════════════════════════════════
         HELPERS
      ══════════════════════════════════════════ */
      window._clearErr = function(id) {
        var el = document.getElementById(id);
        if (el) el.classList.remove('show');
      };

      function _showErr(id, msg) {
        var el = document.getElementById(id);
        if (!el) return;
        el.textContent = msg;
        el.classList.add('show');
      }

      function _setLoading(btnId, on) {
        var btn = document.getElementById(btnId);
        if (btn) btn.classList.toggle('loading', on);
      }

      window._togglePw = function(inputId, btn) {
        var el = document.getElementById(inputId);
        var isText = el.type === 'text';
        el.type = isText ? 'password' : 'text';
        btn.textContent = isText ? '👁' : '🙈';
      };

      window._checkStrength = function(pw) {
        var fill  = document.getElementById('strength-fill');
        var label = document.getElementById('strength-label');
        if (!fill || !label) return;
        var score = 0;
        if (pw.length >= 6)           score++;
        if (pw.length >= 10)          score++;
        if (/[A-Z]/.test(pw))         score++;
        if (/[0-9]/.test(pw))         score++;
        if (/[^A-Za-z0-9]/.test(pw))  score++;
        var cfg = [
          { w:'0%',   c:'transparent', t:'' },
          { w:'20%',  c:'#ef4444',     t:'WEAK' },
          { w:'40%',  c:'#f97316',     t:'FAIR' },
          { w:'65%',  c:'#eab308',     t:'GOOD' },
          { w:'85%',  c:'#22c55e',     t:'STRONG' },
          { w:'100%', c:'#10b981',     t:'VERY STRONG' },
        ][Math.min(score, 5)];
        fill.style.width = cfg.w; fill.style.background = cfg.c;
        label.textContent = cfg.t; label.style.color = cfg.c;
      };

      function _showSuccess(title, sub) {
        ['login','register','success'].forEach(function(t) {
          document.getElementById('auth-form-' + t).style.display = 'none';
        });
        document.getElementById('auth-success-title').textContent = title;
        document.getElementById('auth-success-sub').textContent   = sub;
        document.getElementById('auth-form-success').style.display = 'block';
      }

      function _resetForms() {
        ['login-email','login-pw','reg-name','reg-email','reg-pw'].forEach(function(id) {
          var el = document.getElementById(id); if (el) el.value = '';
        });
        ['login-email-err','login-pw-err','reg-name-err','reg-email-err','reg-pw-err'].forEach(function(id) {
          window._clearErr(id);
        });
        var sf = document.getElementById('strength-fill');
        var sl = document.getElementById('strength-label');
        if (sf) { sf.style.width = '0%'; sf.style.background = 'transparent'; }
        if (sl) sl.textContent = '';
        _setLoading('login-btn', false);
        _setLoading('reg-btn',   false);
      }

      /* ══════════════════════════════════════════
         LOGIN HANDLER
         — saves token + email + name (from backend)
         — reloads page so React reads localStorage
      ══════════════════════════════════════════ */
      window._handleLogin = function() {
        var email = document.getElementById('login-email').value.trim();
        var pw    = document.getElementById('login-pw').value;

        var ok = true;
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          _showErr('login-email-err', 'Please enter a valid email address.'); ok = false;
        }
        if (!pw) {
          _showErr('login-pw-err', 'Please enter your password.'); ok = false;
        }
        if (!ok) return;

        _setLoading('login-btn', true);

        fetch('http://127.0.0.1:8000/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: pw })
        })
        .then(function(res) {
          return res.json().then(function(data) { return { ok: res.ok, data: data }; });
        })
        .then(function(r) {
          _setLoading('login-btn', false);

          if (!r.ok) {
            _showErr('login-pw-err', r.data.detail || 'Invalid credentials. Please try again.');
            return;
          }

          // ✅ Save token, email, and FULL NAME from backend response
          localStorage.setItem('token',     r.data.access_token);
          localStorage.setItem('userEmail', email);
          // Backend should return name — fall back to email prefix only if missing
          localStorage.setItem('userName',  r.data.name || r.data.user_name || r.data.username || email.split('@')[0]);

          _showSuccess('Welcome back, ' + (r.data.name || 'User') + '! \uD83D\uDE80', 'Login successful — loading...');

          // Reload so React re-reads localStorage and updates navbar
          setTimeout(function() { window.closeModal(); window.location.reload(); }, 1600);
        })
        .catch(function() {
          _setLoading('login-btn', false);
          _showErr('login-pw-err', 'Cannot connect to server. Is the backend running on port 8000?');
        });
      };

      /* ══════════════════════════════════════════
         REGISTER HANDLER
         — saves the name the user typed at signup
         — switches to login tab (user must log in)
      ══════════════════════════════════════════ */
      window._handleRegister = function() {
        var name  = document.getElementById('reg-name').value.trim();
        var email = document.getElementById('reg-email').value.trim();
        var pw    = document.getElementById('reg-pw').value;

        var ok = true;
        if (!name || name.length < 2) {
          _showErr('reg-name-err', 'Please enter your full name.'); ok = false;
        }
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          _showErr('reg-email-err', 'Please enter a valid email address.'); ok = false;
        }
        if (!pw || pw.length < 6) {
          _showErr('reg-pw-err', 'Password must be at least 6 characters.'); ok = false;
        }
        if (!ok) return;

        _setLoading('reg-btn', true);

        fetch('http://127.0.0.1:8000/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name, email: email, password: pw })
        })
        .then(function(res) {
          return res.json().then(function(data) { return { ok: res.ok, data: data }; });
        })
        .then(function(r) {
          _setLoading('reg-btn', false);

          if (!r.ok) {
            _showErr('reg-email-err', r.data.detail || 'Registration failed. Try again.');
            return;
          }

          // ✅ Save the name the user typed so login can use it immediately
          // (If backend auto-logs in and returns a token, save that too)
          localStorage.setItem('pendingName', name);
          if (r.data.access_token) {
            localStorage.setItem('token',     r.data.access_token);
            localStorage.setItem('userEmail', email);
            localStorage.setItem('userName',  name);  // use the name they just typed
            _showSuccess('Welcome, ' + name + '! \uD83C\uDF89', 'Account created — loading...');
            setTimeout(function() { window.closeModal(); window.location.reload(); }, 1600);
          } else {
            // Backend doesn't auto-login — switch to login tab
            _showSuccess('Account created! \uD83C\uDF89', 'Please sign in to continue...');
            setTimeout(function() {
              _resetForms();
              window.authSwitchTab('login');
              // Pre-fill email for convenience
              var emailEl = document.getElementById('login-email');
              if (emailEl) emailEl.value = email;
            }, 1800);
          }
        })
        .catch(function() {
          _setLoading('reg-btn', false);
          _showErr('reg-email-err', 'Cannot connect to server. Is the backend running on port 8000?');
        });
      };

      /* ══════════════════════════════════════════
         GOOGLE OAUTH PLACEHOLDER
      ══════════════════════════════════════════ */
      window._handleSocial = function(provider) {
        alert(provider + ' OAuth — connect your backend OAuth route here.');
      };
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
