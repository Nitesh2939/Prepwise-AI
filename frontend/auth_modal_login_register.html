
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  .wrap{font-family:'Sora',sans-serif;min-height:520px;background:linear-gradient(135deg,#050510 0%,#0a0a20 50%,#050510 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:32px;position:relative;overflow:hidden}
  .grid-overlay{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.04) 1px,transparent 1px);background-size:36px 36px;pointer-events:none}
  .btns{display:flex;gap:12px;position:relative;z-index:2}
  .trigger-btn{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1.5px;padding:11px 28px;border-radius:8px;cursor:pointer;transition:all .2s}
  .btn-login{background:transparent;border:1px solid rgba(0,212,255,0.4);color:#00D4FF}
  .btn-login:hover{background:rgba(0,212,255,0.08);border-color:#00D4FF}
  .btn-reg{background:#00D4FF;border:1px solid #00D4FF;color:#050510;font-weight:700}
  .btn-reg:hover{background:#00bfe8}

  .backdrop{position:absolute;inset:0;background:rgba(3,3,18,0.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:10;opacity:0;pointer-events:none;transition:opacity .25s}
  .backdrop.open{opacity:1;pointer-events:all}

  .modal{background:#09091f;border:1px solid rgba(0,212,255,0.18);border-radius:20px;width:100%;max-width:400px;padding:36px 32px;position:relative;transform:translateY(16px) scale(0.97);transition:transform .28s cubic-bezier(.34,1.4,.64,1),opacity .25s;opacity:0}
  .backdrop.open .modal{transform:translateY(0) scale(1);opacity:1}

  .close-btn{position:absolute;top:16px;right:18px;background:transparent;border:none;color:rgba(255,255,255,0.25);font-size:20px;cursor:pointer;line-height:1;transition:color .15s}
  .close-btn:hover{color:rgba(255,255,255,0.6)}

  .modal-logo{font-family:'Space Mono',monospace;font-size:13px;color:#00D4FF;letter-spacing:2px;margin-bottom:6px}
  .modal-logo span{color:#fff}
  .modal-title{font-size:22px;font-weight:600;color:#fff;margin-bottom:4px}
  .modal-sub{font-size:13px;color:rgba(255,255,255,0.35);margin-bottom:28px}

  .tabs{display:flex;gap:0;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:3px;margin-bottom:28px;background:rgba(255,255,255,0.03)}
  .tab{flex:1;padding:8px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;border:none;border-radius:8px;cursor:pointer;transition:all .2s;background:transparent;color:rgba(255,255,255,0.35)}
  .tab.active{background:rgba(0,212,255,0.12);color:#00D4FF;border:1px solid rgba(0,212,255,0.25)}

  .field{margin-bottom:16px}
  .field label{display:block;font-size:11px;font-family:'Space Mono',monospace;letter-spacing:1.2px;color:rgba(255,255,255,0.35);margin-bottom:7px}
  .field input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:9px;padding:11px 14px;color:#e0e0f0;font-size:14px;font-family:'Sora',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none}
  .field input:focus{border-color:rgba(0,212,255,0.5);box-shadow:0 0 0 3px rgba(0,212,255,0.07)}
  .field input::placeholder{color:rgba(255,255,255,0.2);font-size:13px}
  .field.has-icon{position:relative}
  .field.has-icon input{padding-left:38px}
  .field-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:15px;height:15px;opacity:.35}

  .pw-wrap{position:relative}
  .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.25);font-size:13px;transition:color .15s;padding:2px}
  .pw-toggle:hover{color:rgba(255,255,255,0.6)}

  .err{font-size:12px;color:#ff6b6b;margin-top:5px;display:none}
  .err.show{display:block}

  .submit-btn{width:100%;margin-top:6px;padding:13px;border-radius:10px;font-family:'Space Mono',monospace;font-size:13px;letter-spacing:1.5px;font-weight:700;cursor:pointer;border:none;transition:all .2s;position:relative;overflow:hidden}
  .submit-btn.login-clr{background:linear-gradient(90deg,#00c9f0,#00D4FF);color:#050510}
  .submit-btn.login-clr:hover{filter:brightness(1.1)}
  .submit-btn.reg-clr{background:linear-gradient(90deg,#7c3aed,#a855f7);color:#fff}
  .submit-btn.reg-clr:hover{filter:brightness(1.1)}
  .submit-btn:active{transform:scale(0.98)}
  .submit-btn.loading{pointer-events:none;opacity:.7}
  .submit-btn .spinner{display:none;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
  .submit-btn.loading .btn-txt{opacity:0}
  .submit-btn.loading .spinner{display:block}
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

  .divider{display:flex;align-items:center;gap:10px;margin:20px 0}
  .divider span{font-size:11px;color:rgba(255,255,255,0.2);font-family:'Space Mono',monospace}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.07)}

  .social-row{display:flex;gap:10px}
  .social-btn{flex:1;padding:10px;border-radius:9px;border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.5);font-size:12px;font-family:'Sora',sans-serif;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
  .social-btn:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.8)}

  .switch-txt{text-align:center;margin-top:20px;font-size:12px;color:rgba(255,255,255,0.3)}
  .switch-link{color:#00D4FF;cursor:pointer;text-decoration:underline;background:none;border:none;font-size:12px;font-family:'Sora',sans-serif}
  .switch-link:hover{color:#66e5ff}

  .success-card{text-align:center;padding:12px 0}
  .success-icon{width:60px;height:60px;border-radius:50%;border:2px solid #10B981;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;animation:popIn .4s cubic-bezier(.34,1.6,.64,1)}
  @keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
  .success-title{font-size:18px;font-weight:600;color:#fff;margin-bottom:6px}
  .success-sub{font-size:13px;color:rgba(255,255,255,0.4)}

  .strength-bar{height:3px;border-radius:2px;background:rgba(255,255,255,0.07);margin-top:8px;overflow:hidden}
  .strength-fill{height:100%;border-radius:2px;width:0%;transition:width .3s,background .3s}
  .strength-label{font-size:10px;font-family:'Space Mono',monospace;letter-spacing:1px;margin-top:5px;height:12px}

  .logo-mark{font-size:28px;margin-bottom:6px;text-align:center}
  .preview-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:rgba(0,212,255,0.5);text-align:center;margin-top:4px}
</style>

<div class="wrap">
  <div class="grid-overlay"></div>

  <div class="preview-label">CLICK BELOW TO PREVIEW</div>
  <div class="btns">
    <button class="trigger-btn btn-login" onclick="openModal('login')">LOG IN</button>
    <button class="trigger-btn btn-reg" onclick="openModal('register')">REGISTER</button>
  </div>
  <div class="preview-label" style="opacity:.4">LOGIN / REGISTER MODAL DEMO</div>

  <!-- BACKDROP + MODAL -->
  <div class="backdrop" id="backdrop" onclick="handleBackdropClick(event)">
    <div class="modal" id="modal">
      <button class="close-btn" onclick="closeModal()">✕</button>

      <!-- LOGO -->
      <div class="modal-logo"><span>INTER</span>VIEW_AI</div>

      <!-- TABS -->
      <div class="tabs" id="tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">LOG IN</button>
        <button class="tab" id="tab-register" onclick="switchTab('register')">REGISTER</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="form-login">
        <div class="modal-title">Welcome back</div>
        <div class="modal-sub">Sign in to continue your practice</div>

        <div class="field has-icon">
          <label>GMAIL ADDRESS</label>
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#00D4FF">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
          </svg>
          <input type="email" id="login-email" placeholder="you@gmail.com" oninput="clearErr('login-email-err')"/>
          <div class="err" id="login-email-err"></div>
        </div>

        <div class="field has-icon">
          <label>PASSWORD</label>
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#00D4FF">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <div class="pw-wrap">
            <input type="password" id="login-pw" placeholder="Enter your password" oninput="clearErr('login-pw-err')"/>
            <button class="pw-toggle" onclick="togglePw('login-pw',this)">👁</button>
          </div>
          <div class="err" id="login-pw-err"></div>
        </div>

        <div style="text-align:right;margin-bottom:20px;margin-top:-8px">
          <span style="font-size:11px;color:rgba(0,212,255,0.6);cursor:pointer;font-family:'Space Mono',monospace;letter-spacing:.5px">FORGOT PASSWORD?</span>
        </div>

        <button class="submit-btn login-clr" id="login-btn" onclick="handleLogin()">
          <span class="btn-txt">SIGN IN →</span>
          <div class="spinner"></div>
        </button>

        <div class="divider"><span>OR</span></div>
        <div class="social-row">
          <button class="social-btn" onclick="handleSocial('Google')">
            <svg width="14" height="14" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continue with Google
          </button>
        </div>

        <div class="switch-txt">
          Don't have an account? <button class="switch-link" onclick="switchTab('register')">Register here</button>
        </div>
      </div>

      <!-- REGISTER FORM -->
      <div id="form-register" style="display:none">
        <div class="modal-title">Create account</div>
        <div class="modal-sub">Start your interview journey today</div>

        <div class="field has-icon">
          <label>FULL NAME</label>
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#a855f7">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <input type="text" id="reg-name" placeholder="Your full name" oninput="clearErr('reg-name-err')"/>
          <div class="err" id="reg-name-err"></div>
        </div>

        <div class="field has-icon">
          <label>GMAIL ADDRESS</label>
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#a855f7">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
          </svg>
          <input type="email" id="reg-email" placeholder="you@gmail.com" oninput="clearErr('reg-email-err')"/>
          <div class="err" id="reg-email-err"></div>
        </div>

        <div class="field has-icon">
          <label>PASSWORD</label>
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#a855f7">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <div class="pw-wrap">
            <input type="password" id="reg-pw" placeholder="Min. 6 characters" oninput="checkStrength(this.value);clearErr('reg-pw-err')"/>
            <button class="pw-toggle" onclick="togglePw('reg-pw',this)">👁</button>
          </div>
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <div class="strength-label" id="strength-label" style="color:rgba(255,255,255,0.25)"></div>
          <div class="err" id="reg-pw-err"></div>
        </div>

        <button class="submit-btn reg-clr" id="reg-btn" onclick="handleRegister()">
          <span class="btn-txt">CREATE ACCOUNT →</span>
          <div class="spinner"></div>
        </button>

        <div class="switch-txt" style="margin-top:16px">
          Already have an account? <button class="switch-link" onclick="switchTab('login')">Sign in</button>
        </div>
      </div>

      <!-- SUCCESS CARD -->
      <div id="form-success" style="display:none">
        <div class="success-card">
          <div class="success-icon">✓</div>
          <div class="success-title" id="success-title">Welcome back!</div>
          <div class="success-sub" id="success-sub">Redirecting to your dashboard...</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
function openModal(tab){
  document.getElementById('backdrop').classList.add('open');
  switchTab(tab);
}
function closeModal(){
  document.getElementById('backdrop').classList.remove('open');
  resetForms();
}
function handleBackdropClick(e){
  if(e.target===document.getElementById('backdrop')) closeModal();
}
function switchTab(tab){
  ['login','register','success'].forEach(t=>{
    document.getElementById('form-'+t).style.display='none';
  });
  document.getElementById('form-'+tab).style.display='block';
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-register').classList.toggle('active',tab==='register');
}
function togglePw(id,btn){
  const el=document.getElementById(id);
  const isText=el.type==='text';
  el.type=isText?'password':'text';
  btn.textContent=isText?'👁':'🙈';
}
function showErr(id,msg){
  const el=document.getElementById(id);
  el.textContent=msg;el.classList.add('show');
}
function clearErr(id){
  document.getElementById(id).classList.remove('show');
}
function checkStrength(pw){
  const f=document.getElementById('strength-fill');
  const l=document.getElementById('strength-label');
  let score=0;
  if(pw.length>=6)score++;
  if(pw.length>=10)score++;
  if(/[A-Z]/.test(pw))score++;
  if(/[0-9]/.test(pw))score++;
  if(/[^A-Za-z0-9]/.test(pw))score++;
  const configs=[
    {w:'0%',c:'transparent',t:''},
    {w:'25%',c:'#ef4444',t:'WEAK'},
    {w:'50%',c:'#f97316',t:'FAIR'},
    {w:'75%',c:'#eab308',t:'GOOD'},
    {w:'90%',c:'#22c55e',t:'STRONG'},
    {w:'100%',c:'#10b981',t:'VERY STRONG'},
  ];
  const cfg=configs[Math.min(score,5)];
  f.style.width=cfg.w;f.style.background=cfg.c;
  l.textContent=cfg.t;l.style.color=cfg.c;
}
function setLoading(btnId,on){
  const b=document.getElementById(btnId);
  if(on)b.classList.add('loading'); else b.classList.remove('loading');
}
function handleLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  let ok=true;
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showErr('login-email-err','Please enter a valid email address.');ok=false;}
  if(!pw||pw.length<1){showErr('login-pw-err','Please enter your password.');ok=false;}
  if(!ok)return;
  setLoading('login-btn',true);
  setTimeout(()=>{
    setLoading('login-btn',false);
    showSuccess('Welcome back!','You are now signed in. Redirecting...');
  },1600);
}
function handleRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pw=document.getElementById('reg-pw').value;
  let ok=true;
  if(!name||name.length<2){showErr('reg-name-err','Please enter your full name.');ok=false;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showErr('reg-email-err','Please enter a valid email address.');ok=false;}
  if(!pw||pw.length<6){showErr('reg-pw-err','Password must be at least 6 characters.');ok=false;}
  if(!ok)return;
  setLoading('reg-btn',true);
  setTimeout(()=>{
    setLoading('reg-btn',false);
    showSuccess('Account created!','Welcome to InterviewAI. Redirecting...');
  },1800);
}
function showSuccess(title,sub){
  ['login','register','success'].forEach(t=>document.getElementById('form-'+t).style.display='none');
  document.getElementById('success-title').textContent=title;
  document.getElementById('success-sub').textContent=sub;
  document.getElementById('form-success').style.display='block';
  setTimeout(closeModal,2200);
}
function handleSocial(provider){
  alert(provider+' OAuth — connect your backend here.');
}
function resetForms(){
  ['login-email','login-pw','reg-name','reg-email','reg-pw'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  ['login-email-err','login-pw-err','reg-name-err','reg-email-err','reg-pw-err'].forEach(id=>clearErr(id));
  document.getElementById('strength-fill').style.width='0%';
  document.getElementById('strength-label').textContent='';
  setLoading('login-btn',false);setLoading('reg-btn',false);
}
</script>
